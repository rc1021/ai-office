# AI Office — Docker Compose
# MCP servers (discord-bot, coordination) are spawned by Claude Code via .mcp.json.
# This compose file runs the Pixel Office UI as a standalone web service.

services:
  # Pixel Office — real-time visualization dashboard
  pixel-office:
    build:
      context: .
      target: runtime
    ports:
      - "3847:3847"
    volumes:
      - ./config:/app/config:ro
      - ai-office-data:/app/.ai-office
    environment:
      AI_OFFICE_WORKSPACE: /app/.ai-office
      PIXEL_OFFICE_PORT: "3847"
    restart: unless-stopped

  # Setup wizard (run once: docker compose run setup)
  setup:
    build:
      context: .
      target: runtime
    command: ["node", "setup/dist/wizard.js"]
    profiles: ["setup"]
    stdin_open: true
    tty: true
    volumes:
      - .:/app

volumes:
  ai-office-data:
