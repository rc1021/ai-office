<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Office — Pixel Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: 'Courier New', monospace; }
    #game-container { display: flex; justify-content: center; align-items: center; height: 100vh; }

    /* Task Board */
    #task-board {
      display: none; position: fixed; right: 0; top: 0; width: 360px; height: 100vh;
      background: rgba(20, 20, 40, 0.95); border-left: 2px solid #5865f2;
      overflow-y: auto; padding: 16px; color: #e0e0e0; z-index: 100;
      transition: transform 0.2s ease;
    }
    #task-board.open { display: block; }
    #task-board h2 { color: #5865f2; margin-bottom: 12px; font-size: 16px; }
    .task-card {
      background: rgba(40, 40, 60, 0.8); border-radius: 6px; padding: 10px;
      margin-bottom: 8px; border-left: 3px solid #57f287; font-size: 12px;
      cursor: pointer; transition: background 0.15s;
    }
    .task-card:hover { background: rgba(50, 50, 75, 0.9); }
    .task-card.in_progress, .task-card.checkpoint { border-left-color: #faa61a; }
    .task-card.failed { border-left-color: #ed4245; }
    .task-card.pending, .task-card.assigned { border-left-color: #99aab5; }
    .task-card .title { font-weight: bold; margin-bottom: 4px; }
    .task-card .meta { color: #99aab5; font-size: 11px; }
    .task-card .progress { background: #2c2c3e; border-radius: 3px; height: 6px; margin-top: 6px; }
    .task-card .progress-fill { background: #5865f2; height: 100%; border-radius: 3px; transition: width 0.3s ease; }

    /* Agent Panel */
    #agent-panel {
      display: none; position: fixed; left: 0; top: 0; width: 300px; height: 100vh;
      background: rgba(20, 20, 40, 0.95); border-right: 2px solid #57f287;
      padding: 16px; color: #e0e0e0; z-index: 100; overflow-y: auto;
    }
    #agent-panel.open { display: block; }
    #agent-panel h2 { color: #57f287; margin-bottom: 12px; font-size: 16px; }
    #agent-panel .agent-header { margin-bottom: 12px; }
    #agent-panel .agent-status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 10px; font-weight: bold; color: #111;
    }
    #agent-panel .field {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 12px; padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #agent-panel .label { color: #99aab5; }
    #agent-panel .val { color: #e0e0e0; font-weight: bold; }
    #agent-panel .section-title { font-size: 12px; margin: 12px 0 6px; padding-top: 8px; border-top: 1px solid #333; }
    #agent-panel .agent-task-card {
      background: rgba(40, 40, 60, 0.6); border-radius: 4px; padding: 8px;
      margin-bottom: 6px; font-size: 11px;
    }
    #agent-panel .task-title { font-weight: bold; margin-bottom: 3px; }
    #agent-panel .task-meta { color: #99aab5; font-size: 10px; }
    #agent-panel .progress { background: #2c2c3e; border-radius: 3px; height: 4px; margin-top: 4px; }
    #agent-panel .progress-fill { background: #faa61a; height: 100%; border-radius: 3px; }

    /* Message Feed */
    #message-feed {
      display: none; position: fixed; left: 0; bottom: 32px; right: 0; height: 240px;
      background: rgba(20, 20, 40, 0.95); border-top: 2px solid #9b59b6;
      overflow-y: auto; padding: 12px 16px; color: #e0e0e0; z-index: 100;
    }
    #message-feed.open { display: block; }
    #message-feed h2 { color: #9b59b6; margin-bottom: 8px; font-size: 14px; display: inline; }
    #message-feed .feed-filters { display: flex; gap: 8px; margin: 8px 0; }
    #message-feed .feed-filters select {
      background: #28283c; color: #ccc; border: 1px solid #444; border-radius: 3px;
      padding: 3px 6px; font-size: 11px; font-family: inherit;
    }
    .event-card {
      background: rgba(40, 40, 60, 0.6); border-radius: 4px; padding: 6px 8px;
      margin-bottom: 4px; font-size: 11px;
    }
    .event-card:hover { background: rgba(50, 50, 75, 0.8); }
    .event-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .event-time { color: #666; font-size: 10px; min-width: 24px; }
    .event-agent { color: #e0e0e0; font-weight: bold; font-size: 10px; }
    .event-type {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: bold; color: #fff;
    }
    .event-target { color: #666; font-size: 10px; }
    .event-payload { color: #888; font-size: 10px; margin-top: 2px; word-break: break-all; }
    .event-channel {
      font-size: 9px;
      background: #2f3136;
      color: #72767d;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 4px;
    }

    /* Brainstorm Panel */
    #brainstorm-panel {
      display: none; position: fixed; right: 0; top: 0; width: 360px; height: 100vh;
      background: rgba(20, 20, 40, 0.95); border-left: 2px solid #3498db;
      overflow-y: auto; padding: 16px; color: #e0e0e0; z-index: 100;
      transition: transform 0.2s ease;
    }
    #brainstorm-panel.open { display: block; }
    #brainstorm-panel h2 { color: #3498db; margin-bottom: 12px; font-size: 16px; }
    .brainstorm-session { margin-bottom: 12px; }
    .brainstorm-header { font-weight: bold; color: #fff; padding: 4px 8px; background: #2f3136; border-radius: 4px; margin-bottom: 4px; font-size: 11px; }
    .brainstorm-round { color: #b9bbbe; font-size: 10px; padding: 2px 8px; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .brainstorm-card { padding: 6px 8px; margin: 2px 0; border-radius: 4px; border-left: 3px solid; }
    .brainstorm-card.perspective { background: rgba(52, 152, 219, 0.1); border-color: #3498db; }
    .brainstorm-card.response { background: rgba(46, 204, 113, 0.1); border-color: #2ecc71; }
    .brainstorm-agent { font-weight: bold; font-size: 11px; color: #dcddde; }
    .brainstorm-perspective { font-size: 10px; color: #3498db; margin-left: 6px; }
    .brainstorm-summary { font-size: 10px; color: #96989d; margin-top: 2px; line-height: 1.3; }

    /* Task Detail Modal */
    #task-detail-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; align-items: center; justify-content: center;
    }
    #task-detail-overlay.open { display: flex; }
    #task-detail-modal {
      background: rgba(20, 20, 40, 0.98); border: 2px solid #5865f2;
      border-radius: 8px; width: 480px; max-width: 95vw; max-height: 85vh;
      overflow-y: auto; padding: 20px; color: #e0e0e0; position: relative;
    }
    #task-detail-modal h2 { color: #5865f2; font-size: 16px; margin-bottom: 14px; padding-right: 28px; }
    #task-detail-modal .field {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 8px; font-size: 12px; padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #task-detail-modal .label { color: #99aab5; flex-shrink: 0; width: 120px; }
    #task-detail-modal .val { color: #e0e0e0; font-weight: bold; text-align: right; word-break: break-word; }
    #task-detail-modal .section-title {
      font-size: 12px; color: #99aab5; text-transform: uppercase; letter-spacing: 0.5px;
      margin: 14px 0 6px; padding-top: 10px; border-top: 1px solid #333;
    }
    #task-detail-modal .step-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    #task-detail-modal .step-idx { color: #5865f2; width: 22px; flex-shrink: 0; font-weight: bold; }
    #task-detail-modal .step-desc { flex: 1; color: #ddd; }
    #task-detail-modal .step-status {
      font-size: 10px; padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
    }
    #task-detail-modal .step-status.completed { background: #57f28720; color: #57f287; }
    #task-detail-modal .step-status.skipped { background: #99aab520; color: #99aab5; }
    #task-detail-modal .step-status.in_progress { background: #faa61a20; color: #faa61a; }
    #task-detail-modal .step-status.pending { background: #2c2c3e; color: #666; }
    #task-detail-modal .description-box {
      background: rgba(40,40,60,0.5); border-radius: 4px; padding: 8px; font-size: 11px;
      color: #bbb; margin-bottom: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    }
    #task-detail-modal .progress { background: #2c2c3e; border-radius: 3px; height: 8px; margin: 8px 0; }
    #task-detail-modal .progress-fill { background: #5865f2; height: 100%; border-radius: 3px; transition: width 0.3s ease; }

    /* HUD */
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0; height: 32px;
      background: rgba(20, 20, 40, 0.9); border-top: 1px solid #333;
      display: flex; align-items: center; padding: 0 16px; gap: 24px;
      color: #99aab5; font-size: 12px; z-index: 50;
    }
    .hud-item .value { color: #e0e0e0; font-weight: bold; }

    /* Buttons */
    .btn-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 200;
      background: #5865f2; color: white; border: none; padding: 6px 14px;
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px;
      transition: background 0.15s;
    }
    .btn-toggle:hover { background: #4752c4; }
    .btn-close {
      position: absolute; top: 12px; right: 12px; background: none;
      border: none; color: #99aab5; cursor: pointer; font-size: 18px;
    }
    .btn-close:hover { color: #ffffff; }

    /* Activity Log */
    #activity-log {
      display: none; position: fixed; left: 0; bottom: 32px; right: 0; height: 320px;
      background: rgba(20, 20, 40, 0.95); border-top: 2px solid #e67e22;
      overflow-y: auto; padding: 12px 16px; color: #e0e0e0; z-index: 100;
    }
    #activity-log.open { display: block; }
    #activity-log h2 { color: #e67e22; margin-bottom: 8px; font-size: 14px; display: inline; }
    #activity-log .activity-filters { display: flex; gap: 8px; margin: 8px 0; }
    #activity-log .activity-filters select {
      background: #28283c; color: #ccc; border: 1px solid #444; border-radius: 3px;
      padding: 3px 6px; font-size: 11px; font-family: inherit;
    }
    .activity-row {
      background: rgba(40, 40, 60, 0.6); border-radius: 4px; padding: 6px 8px;
      margin-bottom: 4px; font-size: 11px; cursor: pointer; transition: background 0.15s;
    }
    .activity-row:hover { background: rgba(50, 50, 75, 0.8); }
    .activity-row.expanded { background: rgba(50, 50, 75, 0.9); }
    .activity-header { display: flex; align-items: center; gap: 6px; }
    .activity-time { color: #666; font-size: 10px; min-width: 28px; }
    .activity-source {
      display: inline-block; padding: 1px 4px; border-radius: 3px;
      font-size: 9px; font-weight: bold; color: #fff; min-width: 28px; text-align: center;
    }
    .activity-agent { color: #e0e0e0; font-weight: bold; font-size: 10px; }
    .activity-type {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: bold; color: #fff;
    }
    .activity-target { color: #666; font-size: 10px; }
    .activity-preview { color: #888; font-size: 10px; margin-top: 2px; word-break: break-all; }
    .activity-detail {
      display: none; background: rgba(30, 30, 50, 0.8); border-radius: 4px;
      padding: 8px; margin-top: 6px; font-size: 10px; color: #aaa;
    }
    .activity-row.expanded .activity-detail { display: block; }
    .activity-detail pre {
      background: rgba(20, 20, 35, 0.8); padding: 6px; border-radius: 3px;
      overflow-x: auto; max-height: 200px; color: #ccc; font-size: 10px;
      white-space: pre-wrap; word-break: break-all;
    }
    .activity-detail .detail-meta { color: #666; font-size: 9px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <button class="btn-toggle" id="btn-tasks" title="Toggle Task Board (T)">Tasks</button>
  <button class="btn-toggle" id="btn-messages" style="right:80px" title="Toggle Message Feed (M)">Messages</button>
  <button class="btn-toggle" id="btn-brainstorm" style="right:170px;background:#3498db" title="Brainstorm (B)">Brainstorm</button>
  <button class="btn-toggle" id="btn-activity" style="right:270px;background:#e67e22" title="Activity Log (A)">Activity</button>

  <div id="task-board">
    <button class="btn-close" id="close-tasks">&times;</button>
    <h2>Task Board</h2>
    <div id="task-list"></div>
  </div>

  <div id="agent-panel">
    <button class="btn-close" id="close-agent">&times;</button>
    <h2>Agent Details</h2>
    <div id="agent-details"></div>
  </div>

  <div id="message-feed">
    <button class="btn-close" id="close-messages">&times;</button>
    <h2>Message Feed</h2>
    <div class="feed-filters">
      <select id="filter-agent"></select>
      <select id="filter-type"></select>
    </div>
    <div id="event-list"></div>
  </div>

  <!-- Activity Log Panel -->
  <div id="activity-log">
    <button class="btn-close" id="close-activity">&times;</button>
    <h2>Activity Log</h2>
    <div class="activity-filters">
      <select id="filter-activity-agent"></select>
      <select id="filter-activity-type"></select>
    </div>
    <div id="activity-list"></div>
  </div>

  <!-- Brainstorm Panel -->
  <div id="brainstorm-panel">
    <button class="btn-close" id="close-brainstorm">&times;</button>
    <h2>Brainstorm Sessions</h2>
    <div id="brainstorm-list"></div>
  </div>

  <!-- Task Detail Modal -->
  <div id="task-detail-overlay">
    <div id="task-detail-modal">
      <button class="btn-close" id="close-task-detail">&times;</button>
      <h2 id="task-detail-title"></h2>
      <div id="task-detail-content"></div>
    </div>
  </div>

  <div id="hud">
    <div class="hud-item">Agents: <span class="value" id="hud-agents">0</span></div>
    <div class="hud-item">Tasks: <span class="value" id="hud-tasks">0</span></div>
    <div class="hud-item">Status: <span class="value" id="hud-status">Connecting...</span></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
