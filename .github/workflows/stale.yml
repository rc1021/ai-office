name: Stale

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 30 days and will be closed in 7 days unless there is new activity.'
          stale-pr-message: 'This PR has been inactive for 60 days and will be closed in 14 days unless there is new activity.'
          close-issue-message: 'Closing due to inactivity. Re-open if this is still relevant.'
          close-pr-message: 'Closing due to inactivity. Re-open if you plan to continue.'
          days-before-issue-stale: 30
          days-before-pr-stale: 60
          days-before-issue-close: 7
          days-before-pr-close: 14
          exempt-issue-labels: 'roadmap,pinned,security'
          exempt-pr-labels: 'work-in-progress'
