name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [coordination, discord-bot, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package }}
      - name: Build @ai-office/core (required by discord-bot tests)
        if: matrix.package == 'discord-bot'
        run: npm ci && npm run build
        working-directory: core
      - name: Run tests
        run: npm test
        working-directory: ${{ matrix.package }}

  build:
    name: build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        package: [core, coordination, discord-bot, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package }}
      - name: Install core (dependency for discord-bot)
        if: matrix.package == 'discord-bot' || matrix.package == 'coordination'
        run: npm ci && npm run build
        working-directory: core
      - name: Build
        run: npm run build
        working-directory: ${{ matrix.package }}

  validate-roles:
    name: validate-roles
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check for role template changes
        id: check-roles
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^roles/' || true)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then echo "Role files changed: $CHANGED"; fi
      - name: Install validator dependencies
        if: steps.check-roles.outputs.changed != ''
        run: npm install js-yaml ajv ajv-formats
      - name: Validate role templates
        if: steps.check-roles.outputs.changed != ''
        run: node .github/scripts/validate-roles.js
