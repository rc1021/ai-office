# AI Office Starter Packs
# Pre-configured role combinations for common use cases.
# Leader is always present — these packs define additional worker roles.

starter_packs:
  solo-creator:
    name: "Solo Creator"
    description: "Just you and the Leader. Great for exploring AI Office."
    roles: []

  dev-team:
    name: "Dev Team"
    description: "PM + Software Engineer for building software projects."
    roles: [pm, software-engineer]

  startup-mvp:
    name: "Startup MVP"
    description: "PM + Engineer + Research Analyst for rapid prototyping."
    roles: [pm, software-engineer, research-analyst]

  research-lab:
    name: "Research Lab"
    description: "Research Analyst for deep research and data analysis."
    roles: [research-analyst]

  full-dev-team:
    name: "Full Dev Team"
    description: "Complete software development team with QA and DevOps."
    roles: [pm, software-engineer, qa-engineer, devops-engineer, ui-ux-designer]

  marketing-team:
    name: "Marketing Team"
    description: "Marketing Manager + Content Writer + Community Manager."
    roles: [marketing-manager, content-writer, community-manager]

  finance-office:
    name: "Finance Office"
    description: "Accountant + Financial Analyst for bookkeeping and forecasting."
    roles: [accountant, financial-analyst]

  ecommerce-shop:
    name: "E-Commerce Shop"
    description: "Product Manager + Marketing + Content + Customer Service."
    roles: [product-manager, marketing-manager, content-writer, customer-service-rep]

  legal-firm:
    name: "Legal Firm"
    description: "Legal Advisor + Admin Assistant for legal operations."
    roles: [legal-advisor, admin-assistant]
