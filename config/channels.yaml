# Discord channel configuration for AI Office
# Only channels for human interaction — system monitoring is in Pixel Office

categories:
  - name: "AI OFFICE"
    channels:
      - name: general
        topic: "Chat with your AI Office Leader"
        throttle: none
      - name: approvals
        topic: "Human approval requests"
        throttle: none
      - name: alerts
        topic: "Critical alerts requiring attention"
        throttle: none
      - name: daily-brief
        topic: "Daily office summary"
        throttle: "1/day"
      - name: hr
        topic: "Hiring board — recruit new team members"
        throttle: none
      - name: memo
        topic: "Memos & notes"
        throttle: none
