# Discord channel configuration for AI Office
# Only channels for human interaction — system monitoring is in Pixel Office

categories:
  - name: "AI OFFICE"
    channels:
      - name: general
        topic: "Chat with your AI Office Leader"
        throttle: none
      - name: approvals
        topic: "Human approval requests"
        throttle: none
      - name: alerts
        topic: "Critical alerts requiring attention"
        throttle: none
      - name: daily-brief
        topic: "Daily office summary"
        throttle: "1/day"
      - name: hr
        topic: "Hiring board — recruit new team members"
        throttle: none
      - name: memo
        topic: "Memos & notes"
        throttle: none
      - name: notes-index
        topic: "AI-generated index of memo notes — read only, maintained by Leader"
        type: forum
        tags: ["設計", "待辦", "想法", "bug", "待問", "已完成", "⏰ 待確認"]
        throttle: none
