# AI Office Discord Channel Configuration
# Defines the fixed channel structure, dynamic department channels, and throttle rules.

# Fixed channels (always created)
fixed_channels:
  - category: OFFICE
    channels:
      - name: welcome
        topic: "AI Office 引導、公告、版本更新"
        writers: [system]
        throttle: none
      - name: general
        topic: "用戶主互動 — 在這裡跟 Leader 對話"
        writers: [user, leader]
        throttle: none
      - name: approvals
        topic: "YELLOW/RED 風險行動審批"
        writers: [leader, system]
        throttle: none
      - name: daily-brief
        topic: "每日工作摘要"
        writers: [leader]
        throttle: "1/day"
      - name: alerts
        topic: "WARN/ERROR 警報"
        writers: [system, leader]
        throttle: none

  - category: AI-WORKSPACE
    channels:
      - name: ai-internal
        topic: "Agent 間溝通摘要（可 mute）"
        writers: [leader, workers]
        throttle: "batch:5msg/10s"
      - name: task-board
        topic: "任務看板 — 每任務一 Embed"
        writers: [leader, system]
        throttle: "embed-edit"
      - name: watercooler
        topic: "閒聊 / 有趣發現"
        writers: [leader, workers]
        throttle: "batch:1msg/30s"

  - category: SYSTEM
    channels:
      - name: audit-log
        topic: "審計日誌、OutputGate 攔截紀錄"
        writers: [system]
        throttle: "batch:10msg/30s"
      - name: bot-status
        topic: "Bot 健康、心跳、session 恢復"
        writers: [system]
        throttle: "batch:1msg/5min"
      - name: config
        topic: "角色新增/移除、設定變更"
        writers: [system]
        throttle: none

# Dynamic department channels (created when first role in department is hired)
dynamic_channels:
  template:
    category: "DEPT-{DEPARTMENT_UPPER}"
    channels:
      - name: "dept-{department}"
        topic: "{department} 部門工作頻道"
        writers: [leader, "dept-{department}-workers"]
        throttle: "batch:3msg/15s"
      # Created only when department has clearance 2+ agents
      - name: "dept-{department}-confidential"
        topic: "{department} 機密討論"
        writers: ["dept-{department}-clearance2+"]
        throttle: "batch:3msg/15s"
        condition: "has_clearance_2_plus"

  # Department ID → triggering roles
  departments:
    engineering:
      - software-engineer
      - devops-engineer
      - qa-engineer
      - frontend-engineer
      - backend-engineer
      - data-engineer
      - ml-engineer
      - sre
    finance:
      - accountant
      - financial-analyst
      - stock-analyst
      - risk-manager
      - quant-researcher
    marketing:
      - marketing-manager
      - content-writer
      - seo-specialist
      - ad-specialist
      - social-media-manager
    hr:
      - hr-specialist
      - recruiter
    legal:
      - legal-counsel
      - contract-analyst
      - ip-specialist
      - compliance-officer
    research:
      - research-analyst
      - data-analyst
      - academic-assistant
    design:
      - ui-ux-designer
    operations:
      - pm
      - admin-assistant
    sales:
      - sales-rep
      - account-manager
    support:
      - customer-support

  # Lifecycle rules
  lifecycle:
    archive_on_empty: true         # Archive channel when all dept roles removed
    archive_grace_days: 30         # Days before archived channel is deleted
    archive_prefix: "archived-"

# Throttle bypass rules
throttle_overrides:
  mention_bypass: true    # @mention skips throttle
  error_bypass: true      # ERROR level skips throttle
  thread_bypass: true     # Messages in threads are never throttled

# Night mode
night_mode:
  enabled: false
  # When enabled: suppress batch channels, accumulate messages,
  # send digest at working_hours.start
  exempt_channels:
    - alerts    # Always deliver alerts
    - approvals # Always deliver approval requests

# Thread policy
thread_policy:
  auto_create:
    task_execution: true     # Create thread under task-board embed
    approval_discussion: true # Create thread under approval embed
    daily_brief_followup: true
  auto_archive:
    after_completion_hours: 24
    prefix_on_done: "done-"
    prefix_on_failed: "failed-"
    summary_before_archive: true  # Post summary message before archiving
